<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | REATIVA</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/pages.css">
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>

  <div class="auth-page">
    <div class="auth-container">
      <a href="/" class="auth-back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        Voltar para o site
      </a>

      <div class="auth-header">
        <a href="/" class="auth-logo">
          <div class="auth-logo-icon">R</div>
          <span>REATIVA</span>
        </a>
        <h1 class="auth-title">Bem-vindo de volta</h1>
        <p class="auth-subtitle">Entre na sua conta para continuar</p>
      </div>

      <div class="auth-card">
        <form class="auth-form" id="loginForm">
          <div class="auth-social">
            <button type="button" class="auth-social-btn" onclick="showToast('Integração com Google em breve', 'error')">
              <svg viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
              </svg>
              Google
            </button>
            <button type="button" class="auth-social-btn" onclick="showToast('Integração com GitHub em breve', 'error')">
              <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.17 6.839 9.49.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0 1 12 6.836c.85.004 1.705.114 2.504.336 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.167 22 16.418 22 12c0-5.523-4.477-10-10-10z"/>
              </svg>
              GitHub
            </button>
          </div>

          <div class="auth-divider">
            <span>ou continue com email</span>
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="seu@email.com" required>
            <div class="error-message" id="emailError">Email inválido</div>
          </div>

          <div class="form-group">
            <label for="password">Senha</label>
            <input type="password" id="password" placeholder="Sua senha" required>
            <div class="error-message" id="passwordError">Senha incorreta</div>
          </div>

          <div class="auth-options">
            <label>
              <input type="checkbox"> Lembrar de mim
            </label>
            <a href="#">Esqueceu a senha?</a>
          </div>

          <button type="submit" class="btn btn-primary auth-submit">Entrar</button>
        </form>

        <div class="auth-footer">
          Não tem uma conta? <a href="/pages/register.html">Criar conta</a>
        </div>
      </div>
    </div>
  </div>

  <script src="/assets/js/main.js"></script>
  <script src="/assets/js/supabase.js"></script>
  <script>
    const loginForm = document.getElementById('loginForm');

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email');
      const password = document.getElementById('password');
      const submitBtn = loginForm.querySelector('.auth-submit');
      const emailError = document.getElementById('emailError');
      const passwordError = document.getElementById('passwordError');

      emailError.classList.remove('visible');
      passwordError.classList.remove('visible');
      email.classList.remove('error');
      password.classList.remove('error');

      let valid = true;

      if (!email.value || !email.value.includes('@')) {
        email.classList.add('error');
        emailError.classList.add('visible');
        valid = false;
      }

      if (!password.value || password.value.length < 6) {
        password.classList.add('error');
        passwordError.textContent = 'Senha deve ter pelo menos 6 caracteres';
        passwordError.classList.add('visible');
        valid = false;
      }

      if (!valid) return;

      submitBtn.classList.add('loading');
      submitBtn.textContent = 'Entrando';

      try {
        const result = await window.ReativaAuth.login(email.value, password.value);
        showToast('Login realizado com sucesso!', 'success');
        setTimeout(() => window.location.href = '/', 1000);
      } catch (error) {
        showToast(error.message || 'Erro ao fazer login', 'error');
      } finally {
        submitBtn.classList.remove('loading');
        submitBtn.textContent = 'Entrar';
      }
    });
  </script>
</body>
</html>
